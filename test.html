<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Тест кнопки</title>
<style>
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#0b0c10;
    font-family: -apple-system, sans-serif;
    color:#fff;
    text-align:center;
  }
  h1{
    font-size:42px;
    background: linear-gradient(90deg,#17e88f,#37d0ff,#9b5cff,#ff5ec4,#ff9d3d);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
</style>
</head>
<body>
  <div>
    <h1>🎉 Кнопка працює!</h1>
    <p>Якщо ти бачиш цю сторінку в браузері — все спрацювало правильно.</p>
  </div>
</body>
</html>
